<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Yurimio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#C8A84E',
            'gold-dark': '#A8893A',
            'gold-light': '#D4B85A',
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          letterSpacing: {
            'ultra-wide': '0.35em',
            'mega-wide': '0.5em',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #000; }
    ::selection { background-color: #C8A84E; color: #000; }
  </style>
</head>
<body class="bg-black text-white font-sans antialiased">

  <!-- ========== NAV ========== -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-md border-b border-neutral-900">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 flex items-center justify-between h-16">
      <a href="index.html" class="font-serif text-lg tracking-ultra-wide text-white hover:text-gold transition-colors">YURIMIO</a>
      <div class="hidden sm:flex items-center gap-8">
        <a href="shop.html" class="text-[11px] tracking-ultra-wide uppercase text-neutral-400 hover:text-gold transition-colors">Shop</a>
        <a href="cart.html" class="relative flex items-center gap-2 text-gold transition-colors">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-count text-[10px] font-semibold text-gold">0</span>
        </a>
        <a href="login.html" class="text-[11px] tracking-ultra-wide uppercase text-neutral-400 hover:text-gold transition-colors nav-auth-link">Sign In</a>
      </div>
      <button id="mobile-menu-btn" class="sm:hidden text-neutral-400 hover:text-gold transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="sm:hidden hidden border-t border-neutral-900 bg-black/95 backdrop-blur-md">
      <div class="px-5 py-6 flex flex-col gap-5">
        <a href="shop.html" class="text-sm tracking-ultra-wide uppercase text-neutral-300 hover:text-gold transition-colors">Shop</a>
        <a href="cart.html" class="text-sm tracking-ultra-wide uppercase text-gold transition-colors flex items-center gap-3">Cart <span class="cart-count text-gold text-xs">0</span></a>
        <a href="login.html" class="text-sm tracking-ultra-wide uppercase text-neutral-300 hover:text-gold transition-colors nav-auth-link">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- ========== CART ========== -->
  <div class="pt-28 sm:pt-32 pb-24 md:pb-32 px-5 sm:px-8">
    <div class="max-w-3xl mx-auto">
      <h1 class="font-serif text-3xl sm:text-4xl font-light tracking-ultra-wide text-white mb-10 text-center">YOUR CART</h1>

      <!-- Empty State -->
      <div id="cart-empty" class="text-center py-20 hidden">
        <svg class="w-12 h-12 mx-auto text-neutral-700 mb-6" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <p class="text-neutral-500 text-sm mb-8">Your cart is empty.</p>
        <a href="shop.html" class="bg-gold text-black font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-3.5 hover:bg-gold-light transition-colors duration-300 inline-block">
          CONTINUE SHOPPING
        </a>
      </div>

      <!-- Cart Items -->
      <div id="cart-items" class="space-y-0 border-t border-neutral-800"></div>

      <!-- Cart Summary -->
      <div id="cart-summary" class="hidden mt-10 border-t border-neutral-800 pt-8">
        <div class="flex items-center justify-between mb-8">
          <span class="text-xs tracking-ultra-wide uppercase text-neutral-500 font-semibold">Subtotal</span>
          <span id="cart-total" class="text-gold font-sans text-xl sm:text-2xl font-semibold">$0.00</span>
        </div>
        <p class="text-neutral-600 text-xs mb-8 text-center">Shipping calculated at checkout.</p>

        <button id="checkout-btn" class="w-full bg-gold text-black font-sans text-xs sm:text-sm font-semibold tracking-ultra-wide uppercase py-4 hover:bg-gold-light transition-colors duration-300 mb-4">
          CHECKOUT
        </button>
        <a href="shop.html" class="block w-full text-center border border-neutral-800 text-neutral-400 font-sans text-xs font-semibold tracking-ultra-wide uppercase py-3.5 hover:border-gold/40 hover:text-gold transition-colors duration-300">
          CONTINUE SHOPPING
        </a>
      </div>
    </div>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="py-10 px-5 border-t border-neutral-900">
    <div class="max-w-4xl mx-auto text-center">
      <p class="text-neutral-700 text-[10px] sm:text-xs tracking-wider">&copy; 2026 Yurimio. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function renderCartPage() {
      const cart = window.YurimioCart.get();
      const itemsEl = document.getElementById('cart-items');
      const emptyEl = document.getElementById('cart-empty');
      const summaryEl = document.getElementById('cart-summary');
      const totalEl = document.getElementById('cart-total');

      if (cart.length === 0) {
        itemsEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        summaryEl.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      summaryEl.classList.remove('hidden');

      itemsEl.innerHTML = cart.map(item => `
        <div class="flex items-start gap-4 sm:gap-6 py-6 border-b border-neutral-800">
          <div class="w-20 h-24 sm:w-24 sm:h-28 bg-neutral-950 border border-neutral-800 overflow-hidden flex-shrink-0">
            ${item.image
              ? `<img src="${esc(item.image)}" alt="${esc(item.name)}" class="w-full h-full object-cover">`
              : '<div class="w-full h-full flex items-center justify-center text-neutral-800 text-xs">IMG</div>'
            }
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="text-white text-sm sm:text-base font-medium mb-1">${esc(item.name)}</h3>
            <p class="text-gold text-sm font-semibold mb-4">$${item.price.toFixed(2)}</p>
            <div class="flex items-center gap-3">
              <button onclick="changeQty('${esc(item.id)}', -1)" class="w-8 h-8 border border-neutral-800 text-neutral-400 hover:border-gold hover:text-gold flex items-center justify-center text-xs transition-colors">−</button>
              <span class="text-white text-sm w-6 text-center">${item.quantity}</span>
              <button onclick="changeQty('${esc(item.id)}', 1)" class="w-8 h-8 border border-neutral-800 text-neutral-400 hover:border-gold hover:text-gold flex items-center justify-center text-xs transition-colors">+</button>
              <button onclick="removeItem('${esc(item.id)}')" class="ml-auto text-neutral-600 hover:text-red-400 transition-colors text-[10px] tracking-ultra-wide uppercase">Remove</button>
            </div>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      totalEl.textContent = `$${total.toFixed(2)}`;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function changeQty(id, delta) {
      const cart = window.YurimioCart.get();
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) { removeItem(id); return; }
      window.YurimioCart.save(cart);
      window.YurimioCart.updateAllCounts();
      renderCartPage();
    }

    function removeItem(id) {
      const cart = window.YurimioCart.get().filter(i => i.id !== id);
      window.YurimioCart.save(cart);
      window.YurimioCart.updateAllCounts();
      renderCartPage();
    }

    // Checkout placeholder
    document.getElementById('checkout-btn').addEventListener('click', () => {
      // TODO: Connect to Stripe Checkout
      alert('Checkout will be connected to Stripe for secure payment processing.');
    });

    renderCartPage();
  </script>
</body>
</html>
