<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bag — Yurimio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#C8A84E',
            'gold-dark': '#A8893A',
            'gold-light': '#D4B85A',
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          letterSpacing: {
            'ultra-wide': '0.35em',
            'mega-wide': '0.5em',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #000; }
    ::selection { background-color: #C8A84E; color: #000; }
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.12s; }
    nav { transition: height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease; }
    nav.scrolled { background-color: rgba(0,0,0,0.97); border-color: rgba(200,168,78,0.12); }
    nav.scrolled .nav-inner { height: 52px; }
    .nav-inner { transition: height 0.3s ease; }
    .qty-btn:hover { background-color: #C8A84E; color: #000; }
  </style>
</head>
<body class="bg-black text-white font-sans antialiased">

  <!-- ========== NAV ========== -->
  <nav id="main-nav" class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-neutral-900/50">
    <div class="nav-inner max-w-7xl mx-auto px-5 sm:px-8 flex items-center justify-between h-16">
      <div class="flex items-center w-1/3">
        <a href="shop.html" class="text-[11px] tracking-ultra-wide uppercase text-neutral-400 hover:text-gold transition-colors duration-300">Shop</a>
      </div>
      <div class="flex items-center justify-center w-1/3">
        <a href="index.html" class="font-serif text-lg sm:text-xl tracking-ultra-wide text-white hover:text-gold transition-colors duration-300 -translate-x-3">YURIMIO</a>
      </div>
      <div class="hidden sm:flex items-center justify-end gap-7 w-1/3">
        <!-- <a href="login.html" class="text-[11px] tracking-ultra-wide uppercase text-neutral-400 hover:text-gold transition-colors duration-300 nav-auth-link">Sign In</a> -->
        <a href="cart.html" class="relative flex items-center gap-1.5 text-gold transition-colors duration-300">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-count text-[10px] font-semibold text-gold">0</span>
        </a>
      </div>
      <div class="flex sm:hidden items-center w-1/3 justify-end">
        <a href="cart.html" class="relative flex items-center gap-1.5 text-gold transition-colors">
          <svg class="w-[17px] h-[17px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-count text-[10px] font-semibold text-gold">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ========== CART ========== -->
  <section class="pt-28 sm:pt-32 pb-20 md:pb-32 px-5 sm:px-8">
    <div class="max-w-2xl mx-auto">
      <h1 class="reveal font-serif text-2xl sm:text-3xl md:text-4xl font-light tracking-ultra-wide text-white mb-10 md:mb-14 text-center">YOUR BAG</h1>

      <!-- Empty State -->
      <div id="cart-empty" class="reveal reveal-delay-1 text-center hidden">
        <p class="text-neutral-500 text-sm mb-8">Your bag is empty.</p>
        <a href="shop.html" class="inline-block border border-white/30 text-white font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-3.5 hover:border-gold hover:text-gold transition-all duration-300">
          CONTINUE SHOPPING
        </a>
      </div>

      <!-- Cart Items -->
      <div id="cart-items" class="space-y-6 mb-10">
        <!-- Items rendered via JS -->
      </div>

      <!-- Cart Summary -->
      <div id="cart-summary" class="hidden border-t border-neutral-800/60 pt-8">
        <div class="flex items-center justify-between mb-8">
          <span class="text-[11px] tracking-ultra-wide uppercase text-neutral-400">Total</span>
          <span id="cart-total" class="font-serif text-2xl text-gold font-light">$0.00</span>
        </div>
        <button id="checkout-btn" class="w-full bg-gold text-black font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-4 hover:bg-gold-light transition-all duration-300">
          CHECKOUT
        </button>
        <p class="text-center text-neutral-600 text-[10px] mt-4 tracking-wide">Secure checkout powered by Stripe</p>
      </div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="py-10 px-5 border-t border-neutral-900/50">
    <div class="max-w-4xl mx-auto text-center">
      <p class="text-neutral-700 text-[10px] sm:text-xs tracking-wider">&copy; 2026 Yurimio. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
    });

    function renderCart() {
      const items = window.YurimioCart.get();
      const container = document.getElementById('cart-items');
      const empty = document.getElementById('cart-empty');
      const summary = document.getElementById('cart-summary');
      const totalEl = document.getElementById('cart-total');

      container.innerHTML = '';

      if (!items.length) {
        empty.classList.remove('hidden');
        summary.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');
      summary.classList.remove('hidden');

      let total = 0;
      items.forEach(item => {
        total += item.price * item.qty;
        const row = document.createElement('div');
        row.className = 'flex items-center gap-5 border-b border-neutral-900/50 pb-6';
        row.innerHTML = `
          <div class="w-20 h-20 sm:w-24 sm:h-24 bg-neutral-950 border border-neutral-800/60 overflow-hidden flex-shrink-0">
            <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-serif text-base sm:text-lg text-white truncate">${escapeHtml(item.name)}</h3>
            <p class="text-gold text-sm mt-1">$${(item.price).toFixed(2)}</p>
          </div>
          <div class="flex items-center border border-neutral-700 flex-shrink-0">
            <button onclick="updateQty('${escapeHtml(item.id)}', -1)" class="qty-btn w-8 h-8 flex items-center justify-center text-neutral-400 border-r border-neutral-700 transition-all duration-200 text-xs">−</button>
            <span class="w-8 h-8 flex items-center justify-center text-xs text-white">${item.qty}</span>
            <button onclick="updateQty('${escapeHtml(item.id)}', 1)" class="qty-btn w-8 h-8 flex items-center justify-center text-neutral-400 border-l border-neutral-700 transition-all duration-200 text-xs">+</button>
          </div>
          <button onclick="removeItem('${escapeHtml(item.id)}')" class="text-neutral-600 hover:text-red-400 transition-colors flex-shrink-0 ml-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        `;
        container.appendChild(row);
      });

      totalEl.textContent = '$' + total.toFixed(2);

      // Update nav cart counts
      document.querySelectorAll('.cart-count').forEach(el => {
        el.textContent = items.reduce((sum, i) => sum + i.qty, 0);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateQty(id, delta) {
      const items = window.YurimioCart.get();
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.qty = Math.max(1, Math.min(10, item.qty + delta));
      window.YurimioCart.save(items);
      renderCart();
    }

    function removeItem(id) {
      const items = window.YurimioCart.get().filter(i => i.id !== id);
      window.YurimioCart.save(items);
      renderCart();
    }

    /* ---------- Stripe Checkout ---------- */
    // IMPORTANT: Replace the price ID below with the real one from Stripe Dashboard.
    // To get it: Stripe Dashboard → Products → Add Product → name "Leverage", price $30 → 
    // copy the Price ID (starts with price_). Then paste it below.
    const STRIPE_PUBLISHABLE_KEY = 'pk_live_51TBYYNHPeZhm1HSMcmsLCBygL6ul0tvjIOh4OMWVNuMACL0UGbXXauP2fsyW5ijKzYS7sZZRbyGeJn25O6dBIWtq00mDvWpRlK';
    const STRIPE_PRICE_ID = 'price_1TCqNRHPeZhm1HSMBr22aV71'; 

    const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

    document.getElementById('checkout-btn').addEventListener('click', () => {
      const items = window.YurimioCart.get();
      if (!items.length) return;

      if (STRIPE_PRICE_ID === 'REPLACE_WITH_PRICE_ID') {
        alert('Checkout is almost ready — the store owner needs to create the product in Stripe Dashboard first.');
        return;
      }

      const totalQty = items.reduce((sum, i) => sum + i.qty, 0);

      stripe.redirectToCheckout({
        lineItems: [{ price: STRIPE_PRICE_ID, quantity: totalQty }],
        mode: 'payment',
        successUrl: window.location.origin + '/colognes-by-yurimio/index.html?checkout=success',
        cancelUrl: window.location.origin + '/colognes-by-yurimio/cart.html?checkout=cancelled',
      }).then(result => {
        if (result.error) {
          alert(result.error.message);
        }
      });
    });
  </script>
</body>
</html>
