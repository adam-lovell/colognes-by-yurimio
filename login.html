<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Yurimio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#C8A84E',
            'gold-dark': '#A8893A',
            'gold-light': '#D4B85A',
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          letterSpacing: {
            'ultra-wide': '0.35em',
            'mega-wide': '0.5em',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #000; }
    ::selection { background-color: #C8A84E; color: #000; }
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.12s; }
    .reveal-delay-2 { transition-delay: 0.24s; }
    nav { transition: height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease; }
    nav.scrolled { background-color: rgba(0,0,0,0.97); border-color: rgba(200,168,78,0.12); }
    nav.scrolled .nav-inner { height: 52px; }
    .nav-inner { transition: height 0.3s ease; }
    input:focus { border-color: #C8A84E !important; }
  </style>
</head>
<body class="bg-black text-white font-sans antialiased">

  <!-- ========== NAV ========== -->
  <nav id="main-nav" class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-neutral-900/50">
    <div class="nav-inner max-w-7xl mx-auto px-5 sm:px-8 flex items-center justify-between h-16">
      <div class="flex items-center w-1/3">
        <a href="shop.html" class="text-[11px] tracking-ultra-wide uppercase text-neutral-400 hover:text-gold transition-colors duration-300">Shop</a>
      </div>
      <div class="flex items-center justify-center w-1/3">
        <a href="index.html" class="font-serif text-lg sm:text-xl tracking-ultra-wide text-white hover:text-gold transition-colors duration-300">YURIMIO</a>
      </div>
      <div class="hidden sm:flex items-center justify-end gap-7 w-1/3">
        <a href="login.html" class="text-[11px] tracking-ultra-wide uppercase text-gold transition-colors duration-300 nav-auth-link">Sign In</a>
        <a href="cart.html" class="relative flex items-center gap-1.5 text-neutral-400 hover:text-gold transition-colors duration-300">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-count text-[10px] font-semibold text-gold">0</span>
        </a>
      </div>
      <div class="flex sm:hidden items-center gap-4 w-1/3 justify-end">
        <a href="cart.html" class="relative flex items-center gap-1.5 text-neutral-400 hover:text-gold transition-colors">
          <svg class="w-[17px] h-[17px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-count text-[10px] font-semibold text-gold">0</span>
        </a>
        <button id="mobile-menu-btn" class="text-neutral-400 hover:text-gold transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5"/></svg>
        </button>
      </div>
    </div>
    <div id="mobile-menu" class="sm:hidden hidden border-t border-neutral-900/50 bg-black/97 backdrop-blur-md">
      <div class="px-5 py-5 flex flex-col gap-4">
        <a href="shop.html" class="text-xs tracking-ultra-wide uppercase text-neutral-300 hover:text-gold transition-colors">Shop</a>
        <a href="login.html" class="text-xs tracking-ultra-wide uppercase text-gold transition-colors nav-auth-link">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- ========== AUTH ========== -->
  <section class="pt-28 sm:pt-32 pb-20 md:pb-32 px-5 sm:px-8">
    <div class="max-w-sm mx-auto">

      <!-- SIGN IN FORM -->
      <div id="signin-view">
        <h1 class="reveal font-serif text-2xl sm:text-3xl md:text-4xl font-light tracking-ultra-wide text-white mb-10 text-center">SIGN IN</h1>
        <div id="signin-error" class="hidden text-red-400 text-xs text-center mb-6 tracking-wide"></div>
        <div class="reveal reveal-delay-1 space-y-5 mb-8">
          <input type="email" id="signin-email" placeholder="Email" autocomplete="email"
            class="w-full bg-transparent text-neutral-300 text-sm pb-3 border-b border-neutral-700 outline-none transition-colors duration-300 placeholder:text-neutral-600">
          <input type="password" id="signin-password" placeholder="Password" autocomplete="current-password"
            class="w-full bg-transparent text-neutral-300 text-sm pb-3 border-b border-neutral-700 outline-none transition-colors duration-300 placeholder:text-neutral-600">
        </div>
        <div class="reveal reveal-delay-2">
          <button id="signin-btn" class="w-full bg-gold text-black font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-4 hover:bg-gold-light transition-all duration-300">
            SIGN IN
          </button>
        </div>
        <p class="reveal reveal-delay-2 text-center text-neutral-500 text-xs mt-8">
          Don't have an account? <button id="show-signup" class="text-gold hover:text-gold-light transition-colors underline underline-offset-2">Create one</button>
        </p>
      </div>

      <!-- CREATE ACCOUNT FORM -->
      <div id="signup-view" class="hidden">
        <h1 class="reveal font-serif text-2xl sm:text-3xl md:text-4xl font-light tracking-ultra-wide text-white mb-10 text-center">CREATE ACCOUNT</h1>
        <div id="signup-error" class="hidden text-red-400 text-xs text-center mb-6 tracking-wide"></div>
        <div class="reveal reveal-delay-1 space-y-5 mb-8">
          <input type="text" id="signup-name" placeholder="Full Name" autocomplete="name"
            class="w-full bg-transparent text-neutral-300 text-sm pb-3 border-b border-neutral-700 outline-none transition-colors duration-300 placeholder:text-neutral-600">
          <input type="email" id="signup-email" placeholder="Email" autocomplete="email"
            class="w-full bg-transparent text-neutral-300 text-sm pb-3 border-b border-neutral-700 outline-none transition-colors duration-300 placeholder:text-neutral-600">
          <input type="password" id="signup-password" placeholder="Password (6+ characters)" autocomplete="new-password"
            class="w-full bg-transparent text-neutral-300 text-sm pb-3 border-b border-neutral-700 outline-none transition-colors duration-300 placeholder:text-neutral-600">
        </div>
        <div class="reveal reveal-delay-2">
          <button id="signup-btn" class="w-full bg-gold text-black font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-4 hover:bg-gold-light transition-all duration-300">
            CREATE ACCOUNT
          </button>
        </div>
        <p class="reveal reveal-delay-2 text-center text-neutral-500 text-xs mt-8">
          Already have an account? <button id="show-signin" class="text-gold hover:text-gold-light transition-colors underline underline-offset-2">Sign in</button>
        </p>
      </div>

      <!-- LOGGED IN VIEW -->
      <div id="loggedin-view" class="hidden text-center">
        <h1 class="reveal font-serif text-2xl sm:text-3xl md:text-4xl font-light tracking-ultra-wide text-white mb-4">WELCOME BACK</h1>
        <p id="user-display-name" class="reveal reveal-delay-1 text-gold font-serif text-lg italic mb-10"></p>
        <div class="reveal reveal-delay-2 flex flex-col gap-4">
          <a href="shop.html" class="w-full bg-gold text-black font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-4 hover:bg-gold-light transition-all duration-300 text-center">
            SHOP NOW
          </a>
          <button id="signout-btn" class="w-full border border-white/30 text-white font-sans text-xs font-semibold tracking-ultra-wide uppercase px-10 py-3.5 hover:border-gold hover:text-gold transition-all duration-300">
            SIGN OUT
          </button>
        </div>
      </div>

    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="py-10 px-5 border-t border-neutral-900/50">
    <div class="max-w-4xl mx-auto text-center">
      <p class="text-neutral-700 text-[10px] sm:text-xs tracking-wider">&copy; 2026 Yurimio. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const signinView = document.getElementById('signin-view');
      const signupView = document.getElementById('signup-view');
      const loggedinView = document.getElementById('loggedin-view');
      const signinError = document.getElementById('signin-error');
      const signupError = document.getElementById('signup-error');

      function showView(view) {
        [signinView, signupView, loggedinView].forEach(v => v.classList.add('hidden'));
        view.classList.remove('hidden');
        // Re-trigger reveals
        view.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      }

      // Check if already logged in
      const user = window.YurimioAuth.getUser();
      if (user) {
        document.getElementById('user-display-name').textContent = user.name;
        showView(loggedinView);
      }

      // Tab switching
      document.getElementById('show-signup').addEventListener('click', () => showView(signupView));
      document.getElementById('show-signin').addEventListener('click', () => showView(signinView));

      // Sign In
      document.getElementById('signin-btn').addEventListener('click', () => {
        const email = document.getElementById('signin-email').value.trim();
        const password = document.getElementById('signin-password').value;

        signinError.classList.add('hidden');
        if (!email || !password) {
          signinError.textContent = 'Please fill in all fields.';
          signinError.classList.remove('hidden');
          return;
        }

        const result = window.YurimioAuth.signIn(email, password);
        if (result.error) {
          signinError.textContent = result.error;
          signinError.classList.remove('hidden');
          return;
        }

        document.getElementById('user-display-name').textContent = result.user.name;
        showView(loggedinView);
        window.YurimioAuth.updateNavLinks();
      });

      // Sign Up
      document.getElementById('signup-btn').addEventListener('click', () => {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;

        signupError.classList.add('hidden');
        if (!name || !email || !password) {
          signupError.textContent = 'Please fill in all fields.';
          signupError.classList.remove('hidden');
          return;
        }
        if (password.length < 6) {
          signupError.textContent = 'Password must be at least 6 characters.';
          signupError.classList.remove('hidden');
          return;
        }

        const result = window.YurimioAuth.createAccount(name, email, password);
        if (result.error) {
          signupError.textContent = result.error;
          signupError.classList.remove('hidden');
          return;
        }

        document.getElementById('user-display-name').textContent = result.user.name;
        showView(loggedinView);
        window.YurimioAuth.updateNavLinks();
      });

      // Sign Out
      document.getElementById('signout-btn').addEventListener('click', () => {
        window.YurimioAuth.signOut();
        showView(signinView);
        window.YurimioAuth.updateNavLinks();
      });
    });
  </script>
</body>
</html>
